appId: com.unityarchitect.ai
productName: Unity Architect AI
copyright: Copyright © 2026 Unity Architect AI
directories:
  output: build
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
extraResources:
  - from: ../../Backend/dist/backend
    to: Backend
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  # identity: null → imzasız build (test dağıtımı için)
  # Developer ID sertifikan olduğunda bu satırı kaldır
  identity: null
  hardenedRuntime: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - tr_TR
    - en_US
  language: 1055
publish: null
