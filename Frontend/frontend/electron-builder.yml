appId: com.unityarchitect.ai
productName: Unity Architect AI
copyright: Copyright © 2026 Unity Architect AI
directories:
  output: build
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
extraResources:
  - from: ../../Backend
    to: Backend
    filter:
      - "app/**/*"
      - "venv/**/*"
      - "requirements.txt"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.git/**"
  - from: ../../Backend/.env
    to: Backend/.env
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
publish: null
