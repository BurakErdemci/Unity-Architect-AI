version: "3.9"

services:
  backend:
    build: ./Backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend-data:/data
    env_file:
      - path: ./Backend/.env
        required: false
    environment:
      - DB_PATH=/data/unity_master_v3.db
    restart: unless-stopped

volumes:
  backend-data:
